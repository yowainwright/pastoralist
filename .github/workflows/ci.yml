name: ci

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.2.0
        name: Install Bun
        with:
          bun-version: 1.3.9

      - name: Get Bun cache directory
        id: bun-cache
        run: |
          echo "bun_cache_dir=$(bun pm cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5.0.5
        name: Setup Bun cache
        with:
          path: ${{ steps.bun-cache.outputs.bun_cache_dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - name: Check dependency update policy
        run: bun run deps:check
      - run: rm -rf dist .turbo
      - run: bun run build
      - run: cd app && bun run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      - run: bun run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      - name: Run tests with coverage
        run: bun test tests/unit/ --coverage --coverage-reporter=lcov
        env:
          CI: true
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      - name: Filter coverage to src only
        run: sed -n '/^SF:src\//,$p' coverage/lcov.info > coverage/src.info && mv coverage/src.info coverage/lcov.info
      - run: bun run test:bench
        env:
          CI: true
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      - run: bun run test:integration:docker
        env:
          CI: true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  node-compat:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node-version: [20, 22, 24]
      fail-fast: false

    name: node ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        name: Setup Node.js
        with:
          node-version: ${{ matrix.node-version }}

      - uses: oven-sh/setup-bun@v2.2.0
        name: Install Bun
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Test with Node.js
        run: node dist/index.js --help

      - name: Run unit tests
        run: bun test tests/unit/
        env:
          CI: true

  e2e:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        package-manager: [pnpm, npm, yarn]
      fail-fast: false

    name: e2e (${{ matrix.package-manager }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.2.0
        name: Install Bun
        with:
          bun-version: 1.3.9

      - name: Get Bun cache directory
        id: bun-cache
        run: |
          echo "bun_cache_dir=$(bun pm cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5.0.5
        name: Setup Bun cache
        with:
          path: ${{ steps.bun-cache.outputs.bun_cache_dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Run E2E Tests (${{ matrix.package-manager }})
        run: |
          cd tests/e2e
          docker compose up --abort-on-container-exit e2e-${{ matrix.package-manager }}
        env:
          CI: true
