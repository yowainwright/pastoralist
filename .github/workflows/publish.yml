name: publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun test tests/unit/
        env:
          CI: true

      - run: bun run build-dist

      - name: Resolve npm dist-tag
        id: dist-tag
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" =~ -(alpha|beta|rc) ]]; then
            echo "tag=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Pack npm tarball
        id: pack
        run: |
          npm pack --ignore-scripts --json > npm-pack.json
          TARBALL="$(node -e "const fs = require('node:fs'); const text = fs.readFileSync('npm-pack.json', 'utf8'); const start = text.indexOf('['); if (start < 0) throw new Error('npm pack JSON output not found'); const [pkg] = JSON.parse(text.slice(start)); console.log(pkg.filename)")"
          test -n "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Attest npm tarball
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public --tag "${{ steps.dist-tag.outputs.tag }}"
