name: Release Confidence

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "pastoralist version to test (leave blank for latest on npm)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(npm view pastoralist version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing pastoralist@$VERSION"

      - name: Wait for npm availability
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 20); do
            if npm view "pastoralist@$VERSION" version > /dev/null 2>&1; then
              echo "pastoralist@$VERSION is available on npm"
              exit 0
            fi
            echo "Attempt $i/20: not yet available, retrying in 30s..."
            sleep 30
          done
          echo "::error::Timed out waiting for pastoralist@$VERSION on npm"
          exit 1

  test-node:
    name: node${{ matrix.node }} / ${{ matrix.pm }}
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
        pm: [npm, pnpm, yarn]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test in clean container
        env:
          PASTORALIST_VERSION: ${{ needs.resolve-version.outputs.version }}
          PM: ${{ matrix.pm }}
        run: |
          docker run --rm \
            -e PASTORALIST_VERSION \
            -e PM \
            "node:${{ matrix.node }}-alpine" \
            sh -c '
              set -e

              apk add --no-cache bash git > /dev/null 2>&1

              if [ "$PM" = "pnpm" ]; then
                corepack enable
                corepack prepare "pnpm@10" --activate 2>/dev/null || true
              elif [ "$PM" = "yarn" ]; then
                corepack enable
                corepack prepare "yarn@4" --activate 2>/dev/null || true
              fi

              npm install -g "pastoralist@${PASTORALIST_VERSION}" --quiet

              pastoralist --version

              mkdir /fixture && cd /fixture
              git init -q
              git config user.email "ci@test.local"
              git config user.name "CI"

              if [ "$PM" = "pnpm" ]; then
                printf '"'"'{"name":"fixture","version":"1.0.0","dependencies":{"lodash":"^4.17.0"},"pnpm":{"overrides":{"lodash":"4.17.21"}}}'"'"' > package.json
                pnpm install --silent
              elif [ "$PM" = "yarn" ]; then
                printf '"'"'{"name":"fixture","version":"1.0.0","dependencies":{"lodash":"^4.17.0"},"resolutions":{"lodash":"4.17.21"}}'"'"' > package.json
                yarn install --silent
              else
                printf '"'"'{"name":"fixture","version":"1.0.0","dependencies":{"lodash":"^4.17.0"},"overrides":{"lodash":"4.17.21"}}'"'"' > package.json
                npm install --silent
              fi

              pastoralist --dry-run

              pastoralist

              grep -q '"'"'"pastoralist"'"'"' package.json \
                || (echo "pastoralist appendix missing from package.json" && exit 1)

              echo "node${{ matrix.node }} / $PM passed"
            '

  test-bun:
    name: bun (latest)
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test in clean container
        env:
          PASTORALIST_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          docker run --rm \
            -e PASTORALIST_VERSION \
            "oven/bun:latest" \
            sh -c '
              set -e

              apt-get install -y git > /dev/null 2>&1 || apk add --no-cache git > /dev/null 2>&1 || true

              bun install -g "pastoralist@${PASTORALIST_VERSION}"

              pastoralist --version

              mkdir /fixture && cd /fixture
              git init -q
              git config user.email "ci@test.local"
              git config user.name "CI"

              printf '"'"'{"name":"fixture","version":"1.0.0","dependencies":{"lodash":"^4.17.0"},"overrides":{"lodash":"4.17.21"}}'"'"' > package.json
              bun install --silent

              pastoralist --dry-run

              pastoralist

              grep -q '"'"'"pastoralist"'"'"' package.json \
                || (echo "pastoralist appendix missing from package.json" && exit 1)

              echo "bun passed"
            '

  trigger-external:
    name: Trigger external tests
    needs: [resolve-version, test-node, test-bun]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'release'
    steps:
      - name: Dispatch to pastoralist-test
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.PASTORALIST_TEST_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'yowainwright',
              repo: 'pastoralist-test',
              event_type: 'pastoralist-release',
              client_payload: {
                version: '${{ needs.resolve-version.outputs.version }}',
                release_url: '${{ github.event.release.html_url }}',
              }
            });
            console.log('Triggered external tests for ${{ needs.resolve-version.outputs.version }}');
