name: update deps

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 5"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
        name: Install Bun

      - run: bun install --frozen-lockfile
      - run: bun run update
      - run: bun install
      - name: Verify dependency update policy
        run: bun run deps:check
      - run: bun run build
      - run: bun run test
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.PR_CREATE_TOKEN }}
          commit-message: Update dependencies
          title: "[Codependence] update dependencies"
          body: |
            ## Dependency updates
            Auto-generated by [codependence][1] using [create-pull-request][2]
            [1]: https://github.com/yowainwright/pastoralist
            [2]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: codependencies
