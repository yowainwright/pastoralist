name: "Pastoralist"
description: "Manage npm/yarn/pnpm overrides with automatic tracking, security scanning, and cleanup"
author: "Jeff Wainwright"
branding:
  icon: "shield"
  color: "green"

inputs:
  mode:
    description: "Operation mode: check (validate only), update (modify files), or pr (create PR with changes)"
    required: false
    default: "update"
  check-security:
    description: "Enable security vulnerability scanning (true/false)"
    required: false
    default: "true"
  security-provider:
    description: "Security provider to use (osv, github, snyk, socket)"
    required: false
    default: "osv"
  security-token:
    description: "Token for security provider (required for github, snyk, socket)"
    required: false
  auto-fix:
    description: "Automatically apply security fixes (true/false)"
    required: false
    default: "true"
  dry-run:
    description: "Preview changes without modifying files (true/false)"
    required: false
    default: "false"
  root-dir:
    description: "Root directory of the project"
    required: false
  dep-paths:
    description: 'Workspace package.json patterns (space-separated globs or "workspace")'
    required: false
  config:
    description: "Deprecated. Config files are auto-detected from root-dir"
    required: false
  fail-on-security:
    description: "Fail the action if security vulnerabilities are found (true/false)"
    required: false
    default: "true"
  fail-on-unused:
    description: "Fail the action if unused overrides are detected (true/false)"
    required: false
    default: "false"
  silent:
    description: "Suppress logging output (true/false)"
    required: false
    default: "false"
  debug:
    description: "Enable debug logging (true/false)"
    required: false
    default: "false"
  pr-title:
    description: "Title for auto-created PR (mode: pr only)"
    required: false
    default: "chore(deps): update dependency overrides"
  pr-body:
    description: "Body for auto-created PR (mode: pr only)"
    required: false
  pr-branch:
    description: "Branch name for auto-created PR (mode: pr only)"
    required: false
    default: "pastoralist/updates"
  pr-labels:
    description: "Labels to add to PR (space-separated, mode: pr only)"
    required: false
    default: "dependencies"
  github-token:
    description: "GitHub token for creating PRs (defaults to GITHUB_TOKEN)"
    required: false

outputs:
  has-security-issues:
    description: "Whether security vulnerabilities were found (true/false)"
    value: ${{ steps.pastoralist.outputs.has-security-issues }}
  has-unused-overrides:
    description: "Whether unused overrides were detected (true/false)"
    value: ${{ steps.pastoralist.outputs.has-unused-overrides }}
  updated:
    description: "Whether package.json was modified (true/false)"
    value: ${{ steps.pastoralist.outputs.updated }}
  security-count:
    description: "Number of security vulnerabilities found"
    value: ${{ steps.pastoralist.outputs.security-count }}
  pr-url:
    description: "URL of created PR (mode: pr only, empty if no changes)"
    value: ${{ steps.create-pr.outputs.pr-url }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install Pastoralist
      shell: bash
      run: |
        set -euo pipefail

        ACTION_PATH="${GITHUB_ACTION_PATH:-$PWD}"

        # Use the action checkout when it has a build artifact. This keeps local
        # action tests pinned to the checked-out ref instead of a caller repo.
        if [ -f "$ACTION_PATH/dist/index.js" ]; then
          echo "Using local build"
          chmod +x "$ACTION_PATH/dist/index.js"
          npm install -g "$ACTION_PATH" --ignore-scripts
        else
          VERSION=$(node -p "require(process.argv[1]).version" "$ACTION_PATH/package.json" 2>/dev/null || true)
          if [ -n "$VERSION" ]; then
            npm install -g "pastoralist@$VERSION"
          else
            npm install -g pastoralist
          fi
        fi

    - name: Run Pastoralist
      id: pastoralist
      shell: bash
      env:
        INPUT_AUTO_FIX: ${{ inputs.auto-fix }}
        INPUT_CHECK_SECURITY: ${{ inputs.check-security }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_DEBUG: ${{ inputs.debug }}
        INPUT_DEP_PATHS: ${{ inputs.dep-paths }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_FAIL_ON_SECURITY: ${{ inputs.fail-on-security }}
        INPUT_FAIL_ON_UNUSED: ${{ inputs.fail-on-unused }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_ROOT_DIR: ${{ inputs.root-dir }}
        INPUT_SECURITY_PROVIDER: ${{ inputs.security-provider }}
        INPUT_SECURITY_TOKEN: ${{ inputs.security-token }}
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: |
        set -u

        case "$INPUT_MODE" in
          check|update|pr) ;;
          *)
            echo "::error::Invalid mode '$INPUT_MODE'. Expected check, update, or pr."
            exit 1
            ;;
        esac

        cmd=(pastoralist --outputFormat json)

        append_list_flag() {
          local flag="$1"
          local values="$2"

          [ -n "$values" ] || return 0

          cmd+=("$flag")
          for value in $values; do
            cmd+=("$value")
          done
        }

        if [ "$INPUT_CHECK_SECURITY" = "true" ]; then
          cmd+=(--checkSecurity)
          append_list_flag --securityProvider "$INPUT_SECURITY_PROVIDER"
        fi

        if [ -n "$INPUT_SECURITY_TOKEN" ]; then
          cmd+=(--securityProviderToken "$INPUT_SECURITY_TOKEN")
        fi

        if [ "$INPUT_AUTO_FIX" = "true" ]; then
          cmd+=(--forceSecurityRefactor)
        fi

        # Check mode validates without modifying files. PR mode must write files
        # so the following step has a diff to commit.
        if [ "$INPUT_MODE" = "check" ] || [ "$INPUT_DRY_RUN" = "true" ]; then
          cmd+=(--dry-run)
        fi

        if [ -n "$INPUT_ROOT_DIR" ]; then
          cmd+=(--root "$INPUT_ROOT_DIR")
        fi

        append_list_flag --depPaths "$INPUT_DEP_PATHS"

        if [ -n "$INPUT_CONFIG" ]; then
          echo "::warning::The config input is deprecated. Put the config file in root-dir so Pastoralist can auto-detect it."
        fi

        if [ "$INPUT_DEBUG" = "true" ]; then
          cmd+=(--debug)
        fi

        echo "Running Pastoralist in $INPUT_MODE mode"
        set +e
        RAW_OUTPUT=$("${cmd[@]}" 2>&1)
        EXIT_CODE=$?
        set -e

        if [ -n "$RAW_OUTPUT" ]; then
          echo "$RAW_OUTPUT"
        fi

        JSON_OUTPUT=$(printf '%s\n' "$RAW_OUTPUT" | awk '
          {
            start = index($0, "{")
            if (start > 0) {
              candidate = substr($0, start)
              if (candidate ~ /^\{.*\}$/) {
                line = candidate
              }
            }
          }
          END { print line }
        ')

        if [ -z "$JSON_OUTPUT" ]; then
          echo "::error::Pastoralist did not produce JSON output."
          exit 1
        fi

        HAS_SECURITY=$(echo "$JSON_OUTPUT" | jq -r '.hasSecurityIssues // false')
        HAS_UNUSED=$(echo "$JSON_OUTPUT" | jq -r '.hasUnusedOverrides // false')
        UPDATED=$(echo "$JSON_OUTPUT" | jq -r '.updated // false')
        SUCCESS=$(echo "$JSON_OUTPUT" | jq -r '.success // false')
        SECURITY_COUNT=$(echo "$JSON_OUTPUT" | jq -r '.securityAlertCount // 0')

        {
          echo "has-security-issues=$HAS_SECURITY"
          echo "has-unused-overrides=$HAS_UNUSED"
          echo "updated=$UPDATED"
          echo "security-count=$SECURITY_COUNT"
        } >> "$GITHUB_OUTPUT"

        # Log summary
        echo "Results: security=$HAS_SECURITY ($SECURITY_COUNT alerts), unused=$HAS_UNUSED, updated=$UPDATED"

        if [ "$EXIT_CODE" -ne 0 ] || [ "$SUCCESS" != "true" ]; then
          echo "::error::Pastoralist failed. Check logs for details."
          exit 1
        fi

        if [ "$INPUT_MODE" = "pr" ]; then
          exit 0
        fi

        if [ "$HAS_SECURITY" = "true" ] && [ "$INPUT_FAIL_ON_SECURITY" = "true" ]; then
          echo "::error::Security vulnerabilities detected ($SECURITY_COUNT). Run 'pastoralist --checkSecurity --forceSecurityRefactor' locally to fix."
          exit 1
        fi

        if [ "$HAS_UNUSED" = "true" ] && [ "$INPUT_FAIL_ON_UNUSED" = "true" ]; then
          echo "::error::Unused overrides detected. Run 'pastoralist' locally to clean up."
          exit 1
        fi

        exit 0

    - name: Create Pull Request
      id: create-pr
      if: inputs.mode == 'pr' && steps.pastoralist.outputs.updated == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        INPUT_BASE_REF: ${{ github.ref_name }}
        INPUT_HAS_SECURITY: ${{ steps.pastoralist.outputs.has-security-issues }}
        INPUT_HAS_UNUSED: ${{ steps.pastoralist.outputs.has-unused-overrides }}
        INPUT_PR_BODY: ${{ inputs.pr-body }}
        INPUT_PR_BRANCH: ${{ inputs.pr-branch }}
        INPUT_PR_LABELS: ${{ inputs.pr-labels }}
        INPUT_PR_TITLE: ${{ inputs.pr-title }}
      run: |
        set -euo pipefail

        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git checkout -B "$INPUT_PR_BRANCH"
        git add -A

        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git commit -m "$INPUT_PR_TITLE"
        git push --force-with-lease -u origin "$INPUT_PR_BRANCH"

        BODY_FILE=$(mktemp)
        if [ -n "$INPUT_PR_BODY" ]; then
          printf '%s\n' "$INPUT_PR_BODY" > "$BODY_FILE"
        else
          cat > "$BODY_FILE" <<'EOF'
        ## Pastoralist Override Updates

        This PR was automatically created by [Pastoralist](https://github.com/yowainwright/pastoralist).

        ### Changes
        - Updated dependency override tracking in \`package.json\`
        EOF

          if [ "$INPUT_HAS_SECURITY" = "true" ]; then
            echo "- Applied security fixes for detected vulnerabilities" >> "$BODY_FILE"
          fi

          if [ "$INPUT_HAS_UNUSED" = "true" ]; then
            echo "- Cleaned up unused overrides" >> "$BODY_FILE"
          fi

          cat >> "$BODY_FILE" <<'EOF'

        ---
        *Generated by Pastoralist GitHub Action*
        EOF
        fi

        label_args=()
        for label in $INPUT_PR_LABELS; do
          label_args+=(--label "$label")
        done

        PR_URL=$(gh pr view "$INPUT_PR_BRANCH" --json url --jq .url 2>/dev/null || true)

        if [ -z "$PR_URL" ]; then
          PR_URL=$(gh pr create \
            --title "$INPUT_PR_TITLE" \
            --body-file "$BODY_FILE" \
            --base "$INPUT_BASE_REF" \
            "${label_args[@]}")
        fi

        echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        echo "Created PR: $PR_URL"
